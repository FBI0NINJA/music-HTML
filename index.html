<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ahmed Syed Player</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
color:white;
}

.player{
width:420px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border-radius:28px;
padding:25px;
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

.brand{
text-align:center;
margin-bottom:20px;
font-size:14px;
color:#aaa;
}

.brand span{
color:#a855f7;
font-weight:bold;
}

.search{
display:flex;
gap:10px;
margin-bottom:20px;
}

.search input{
flex:1;
height:45px;
border:none;
outline:none;
border-radius:12px;
padding:0 15px;
background:rgba(255,255,255,0.1);
color:white;
}

.search button{
width:50px;
border:none;
border-radius:12px;
background:#7c3aed;
color:white;
font-size:18px;
cursor:pointer;
}

.thumb{
width:170px;
height:170px;
border-radius:50%;
margin:20px auto;
background:linear-gradient(45deg,#9333ea,#ec4899,#f59e0b);
display:flex;
align-items:center;
justify-content:center;
font-size:60px;
animation:spin 8s linear infinite;
}

.paused{
animation-play-state:paused;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

.info{
text-align:center;
margin-top:20px;
}

.info h2{
font-size:18px;
margin-bottom:8px;
}

.info p{
font-size:13px;
color:#aaa;
}

.controls{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
margin-top:25px;
}

.controls button{
border:none;
background:none;
color:white;
font-size:24px;
cursor:pointer;
}

.play{
width:65px;
height:65px;
border-radius:50%;
background:#7c3aed !important;
font-size:28px !important;
}

.progress{
margin-top:25px;
}

.progress input{
width:100%;
}

.volume{
margin-top:20px;
display:flex;
align-items:center;
gap:10px;
}

.volume input{
flex:1;
}

.status{
text-align:center;
margin-top:15px;
font-size:12px;
color:#aaa;
}

#player{
display:none;
}
</style>
</head>

<body>

<div class="player">

<div class="brand">
Vibes Player By <span>Ahmed Syed</span>
</div>

<div class="search">
<input type="text" id="urlInput"
placeholder="Paste YouTube Link">
<button onclick="loadVideo()">
<i class="ti ti-search"></i>
</button>
</div>

<div class="thumb" id="thumb">
🎵
</div>

<div class="info">
<h2 id="title">No Song Loaded</h2>
<p id="artist">YouTube Player Ready</p>
</div>

<div class="controls">
<button onclick="back()">
<i class="ti ti-player-skip-back"></i>
</button>

<button class="play" onclick="togglePlay()">
<i class="ti ti-player-play" id="playIcon"></i>
</button>

<button onclick="forward()">
<i class="ti ti-player-skip-forward"></i>
</button>
</div>

<div class="progress">
<input type="range" min="0" max="100"
value="0" id="progress">
</div>

<div class="volume">
<i class="ti ti-volume"></i>
<input type="range" min="0" max="100"
value="100" id="volume">
</div>

<div class="status" id="status">
Ready
</div>

<div id="player"></div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let player;
let playing = false;

function extractVideoID(url) {
const regExp =
/(?:youtube\\.com\\/watch\\?v=|youtu\\.be\\/)([^&\\n?#]+)/;
const match = url.match(regExp);
return match ? match[1] : null;
}

function onYouTubeIframeAPIReady() {
player = new YT.Player('player', {
height: '0',
width: '0',
videoId: '',
playerVars: {
'autoplay': 0,
'controls': 0
},
events: {
'onStateChange': onPlayerStateChange
}
});
}

function loadVideo() {

const url =
document.getElementById('urlInput').value;

const id = extractVideoID(url);

if(!id){
setStatus("Invalid YouTube Link");
return;
}

player.loadVideoById(id);

document.getElementById('title').innerText =
"Playing from YouTube";

document.getElementById('artist').innerText =
id;

setStatus("Loaded Successfully");
}

function togglePlay(){

if(!player) return;

if(playing){
player.pauseVideo();
playing = false;
document.getElementById('playIcon')
.className = 'ti ti-player-play';

document.getElementById('thumb')
.classList.add('paused');

}else{
player.playVideo();
playing = true;
document.getElementById('playIcon')
.className = 'ti ti-player-pause';

document.getElementById('thumb')
.classList.remove('paused');
}
}

function back(){
if(player){
let t = player.getCurrentTime();
player.seekTo(t - 10, true);
}
}

function forward(){
if(player){
let t = player.getCurrentTime();
player.seekTo(t + 10, true);
}
}

function onPlayerStateChange(event){

if(event.data == YT.PlayerState.PLAYING){
playing = true;
document.getElementById('playIcon')
.className = 'ti ti-player-pause';
}

if(event.data == YT.PlayerState.PAUSED){
playing = false;
document.getElementById('playIcon')
.className = 'ti ti-player-play';
}
}

document.getElementById('volume')
.addEventListener('input',function(){

if(player){
player.setVolume(this.value);
}
});

function setStatus(msg){
document.getElementById('status').innerText = msg;
}

setInterval(()=>{

if(player && player.getDuration){

const current = player.getCurrentTime();
const duration = player.getDuration();

if(duration){

const percent =
(current / duration) * 100;

document.getElementById('progress')
.value = percent;
}
}

},500);

document.getElementById('progress')
.addEventListener('input',function(){

if(player){

const duration = player.getDuration();

player.seekTo(
(duration * this.value) / 100,
true
);
}
});
</script>

</body>
</html>
